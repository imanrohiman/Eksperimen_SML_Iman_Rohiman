global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'model_monitoring'
    static_configs:
      - targets: ['localhost:8000']
        labels:
          service: 'model_prediction'
          environment: 'production'
          
  - job_name: 'prometheus_exporter'
    static_configs:
      - targets: ['localhost:8001']
        labels:
          service: 'prometheus_exporter'
          environment: 'production'
